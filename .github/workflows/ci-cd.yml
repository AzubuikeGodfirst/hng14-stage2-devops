name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python Lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint . || true

      - name: Run Hadolint (API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Run Hadolint (Frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi httpx redis

      - name: Run tests
        run: pytest --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test]

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ================= API =================
      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} ./api

      - name: Tag API image
        run: |
          docker tag api:${{ github.sha }} localhost:5000/api:${{ github.sha }}
          docker tag api:${{ github.sha }} localhost:5000/api:latest

      - name: Push API image
        run: |
          docker push localhost:5000/api:${{ github.sha }} || true
          docker push localhost:5000/api:latest || true

      # ================= WORKER =================
      - name: Build Worker image (cached)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag Worker image
        run: |
          docker tag worker:${{ github.sha }} localhost:5000/worker:${{ github.sha }}
          docker tag worker:${{ github.sha }} localhost:5000/worker:latest

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      # ================= FRONTEND =================
      - name: Build Frontend image (cached)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag Frontend image
        run: |
          docker tag frontend:${{ github.sha }} localhost:5000/frontend:${{ github.sha }}
          docker tag frontend:${{ github.sha }} localhost:5000/frontend:latest

      - name: Push Frontend image
        run: |
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 15

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Create and validate job
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/jobs)
          echo "Response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | jq -r '.job_id')
          echo "Job ID: $JOB_ID"

          curl -f http://localhost:8000/jobs/$JOB_ID

      - name: Cleanup (always)
        if: always()
        run: docker compose down -v


  deploy:
    name: Deploy (Main Only)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy stack
        run: docker compose up -d --build

      - name: Health check
        run: curl -f http://localhost:8000/jobs

      - name: Final status
        run: echo "Deployment successful"
