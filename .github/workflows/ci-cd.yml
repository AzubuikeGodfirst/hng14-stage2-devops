name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8

      - name: Run flake8
        run: flake8 api worker


  test:
   name: Unit Tests
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v4

     - name: Set up Python
       uses: actions/setup-python@v5
       with:
         python-version: "3.11"

     - name: Install dependencies
       run: |
         python -m pip install --upgrade pip
         pip install -r api/requirements.txt

     - name: Set PYTHONPATH
       run: echo "PYTHONPATH=$PYTHONPATH:." >> $GITHUB_ENV

     - name: Run tests with coverage
       run: |
         pytest --cov=api --cov-report=xml

     - name: Upload coverage report
       uses: actions/upload-artifact@v4
       with:
         name: coverage-report
         path: coverage.xml


  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api:${{ github.sha }} ./api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} ./worker


  security:
   name: Security Scan (Trivy)
   runs-on: ubuntu-latest
   needs: build

   steps:
     - uses: actions/checkout@v4

     - name: Build API image
       run: docker build -t api:${{ github.sha }} ./api

     - name: Run Trivy scan
       uses: aquasecurity/trivy-action@master
       with:
         image-ref: api:${{ github.sha }}
         format: sarif
         output: trivy-api.sarif
         severity: CRITICAL
         exit-code: 0

     - name: Upload SARIF
       uses: github/codeql-action/upload-sarif@v4
       with:
         sarif_file: trivy-api.sarif


  integration:
   name: Integration Test
   runs-on: ubuntu-latest
   needs: security

   steps:
     - uses: actions/checkout@v4

     - name: Start stack
       run: docker compose up -d --build

     - name: Wait for API readiness
       run: |
         for i in {1..10}; do
           curl -f http://localhost:8000/docs && break
           echo "waiting for API..."
           sleep 3
         done

     - name: Create job
       run: |
         RESPONSE=$(curl -s -X POST http://localhost:8000/jobs)
         echo "Response: $RESPONSE"

         JOB_ID=$(echo $RESPONSE | grep -oP '"job_id":"\K[^"]+')
         echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

     - name: Poll job status
       run: |
         for i in {1..15}; do
           STATUS=$(curl -s http://localhost:8000/jobs/$JOB_ID | grep -oP '"status":"\K[^"]+')
           echo "Status: $STATUS"

           if [ "$STATUS" = "completed" ]; then
             echo "Job completed successfully"
             exit 0
           fi

           sleep 2
         done

         echo "Job did not complete in time"
         exit 1


  deploy:
   name: Deploy (Main Only)
   runs-on: ubuntu-latest
   needs: integration
   if: github.ref == 'refs/heads/main'

   steps:
     - uses: actions/checkout@v4

     - name: Rolling deployment
       run: |
         docker compose up -d --build

     - name: Health check
       run: |
         for i in {1..10}; do
           curl -f http://localhost:8000/docs && exit 0
           sleep 3
         done

         echo "Deployment failed health check"
         exit 1
