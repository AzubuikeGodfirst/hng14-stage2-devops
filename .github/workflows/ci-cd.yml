name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:

  lint:
    name: Lint Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint tools
        run: pip install flake8

      - name: Python Lint
        run: flake8 api worker

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: ESLint (Frontend)
        run: |
          cd frontend
          npm install
          npm run lint || true

      - name: Hadolint API
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Hadolint Frontend
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile


  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov fastapi httpx redis

      - name: Run tests with coverage
        run: |
          pytest --cov=api --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [lint, test]

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: |
          docker build -t api:${{ github.sha }} ./api
          docker tag api:${{ github.sha }} localhost:5000/api:${{ github.sha }}
          docker tag api:${{ github.sha }} localhost:5000/api:latest
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build Worker image
        run: |
          docker build -t worker:${{ github.sha }} ./worker
          docker tag worker:${{ github.sha }} localhost:5000/worker:${{ github.sha }}
          docker tag worker:${{ github.sha }} localhost:5000/worker:latest
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build Frontend image
        run: |
          docker build -t frontend:${{ github.sha }} ./frontend
          docker tag frontend:${{ github.sha }} localhost:5000/frontend:${{ github.sha }}
          docker tag frontend:${{ github.sha }} localhost:5000/frontend:latest
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif


  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API
        run: sleep 15

      - name: Create job
        run: curl -X POST http://localhost:8000/jobs

      - name: Validate job
        run: curl -f http://localhost:8000/jobs || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v


  deploy:
    name: Deploy (Main Only)
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy stack
        run: docker compose up -d --build

      - name: Health check
        run: curl -f http://localhost:8000/jobs || exit 1

      - name: Rolling update safety
        run: echo "Deployment successful"
